<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=297mm">
<title>Rubik's Cube for Dummies</title>
<style>
@page { size: A4 landscape; margin: 1cm; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 11pt;
  line-height: 1.4;
  color: #222;
  padding: 2em;
}
.title {
  font-size: 22pt;
  text-align: center;
  margin-bottom: 0.8em;
  letter-spacing: 1pt;
}
h2 {
  font-size: 18pt;
  margin-top: 1.2em;
  margin-bottom: 0.4em;
  border-bottom: 1px solid #ccc;
  padding-bottom: 0.2em;
}
.variant {
  margin-bottom: 1.5em;
}
.variant .label {
  font-size: 11pt;
  margin-bottom: 0.3em;
  color: #444;
}
.variant .label .alg {
  font-family: 'Consolas', 'Courier New', monospace;
  font-weight: bold;
  color: #111;
  background: #f5f5f5;
  padding: 0.1em 0.4em;
  border-radius: 2px;
  font-size: 10pt;
}
.seq-img {
  display: block;
  height: 400px;
  width: auto;
  margin-bottom: 1em;
}
.notation {
  margin-bottom: 1.5em;
}
.notation-img {
  display: block;
  width: 480px;
  height: auto;
}
</style>
</head>
<body>

<p class="title">Rubik's Cube for Dummies</p>

<h2>Moves Notation</h2>

<div class="notation">
  <img class="notation-img" src="assets/notation.svg" alt="Move Notation">
  <img class="notation-img" src="assets/notation-prime.svg" alt="Move Notation Prime">
</div>

<h2>1. White Cross</h2>

<div class="variant">
  <div class="label">1A. Upside down: <span class="alg">FF</span></div>
  <img class="seq-img" src="assets/01_white_cross_upside-down_seq.svg">
</div>

<div class="variant">
  <div class="label">1B. Elevator: <span class="alg">F' U' R U</span></div>
  <img class="seq-img" src="assets/01_white_cross_elevator_seq.svg">
</div>

<h2>2. White Corners</h2>

<div class="variant">
  <div class="label">2A. Elevator on the right: <span class="alg">D' R' D R</span></div>
  <img class="seq-img" src="assets/02_white_corners_elevator_seq.svg">
</div>

<div class="variant">
  <div class="label">2B. Elevator on the left: <span class="alg">D L D' L'</span></div>
  <img class="seq-img" src="assets/02_white_corners_elevator-m_seq.svg">
</div>

<div class="variant">
  <div class="label">2C. Upside-down: <span class="alg">R' DD R D</span></div>
  <img class="seq-img" src="assets/02_white_corners_upside-down_seq.svg">
  + repeat 2B
</div>

<h2>🔃 3. Middle Layer</h2>
<div class="variant">
  <div class="label">3. To right: <span class="alg">U R U' R' U' F' U F</span></div>
  <img class="seq-img" src="assets/03_middle_layer_to-right_seq.svg">
</div>

</body>
</html>
