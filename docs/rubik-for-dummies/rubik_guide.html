<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=297mm">
<title>Rubik's Cube for Dummies</title>
<style>
@page { size: A4 landscape; margin: 1cm; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 11pt;
  line-height: 1.4;
  color: #222;
  padding: 2em;
}
.title {
  font-size: 22pt;
  text-align: center;
  margin-bottom: 0.8em;
  letter-spacing: 1pt;
}
h2 {
  font-size: 18pt;
  margin-top: 1.2em;
  margin-bottom: 0.4em;
  border-bottom: 1px solid #ccc;
  padding-bottom: 0.2em;
}
.variant {
  margin-bottom: 1.5em;
}
.variant .label {
  font-size: 11pt;
  margin-bottom: 0.3em;
  color: #444;
}
.variant .label .alg {
  font-family: 'Consolas', 'Courier New', monospace;
  font-weight: bold;
  color: #111;
  background: #f5f5f5;
  padding: 0.1em 0.4em;
  border-radius: 2px;
  font-size: 10pt;
}
.seq-img {
  display: block;
  height: 400px;
  width: auto;
  margin-bottom: 1em;
}
</style>
</head>
<body>

<p class="title">Rubik's Cube for Dummies</p>

<h2>Step 1: White Cross</h2>

<div class="variant">
  <div class="label">V1: <span class="alg">F2</span></div>
  <img class="seq-img" src="assets/01_white_cross_red_bottom_1_seq.svg" alt="V1 sequence">
</div>

<div class="variant">
  <div class="label">V2: <span class="alg">D M D' M'</span></div>
  <img class="seq-img" src="assets/01_white_cross_red_bottom_2_seq.svg" alt="V2 sequence">
</div>

</body>
</html>
